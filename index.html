<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽車英文專業術語學科檢定系統</title>
    <style>
        :root {
            --primary-color: #2b5876;
            --secondary-color: #4e4376;
            --success-color: #2ec4b6;
            --danger-color: #e71d36;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 750px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .card {
            display: none;
        }

        .card.active {
            display: block;
        }

        /* 進度條 */
        .progress-container {
            background: #e0e0e0;
            border-radius: 8px;
            height: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--success-color), #20a498);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }

        .info-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* 題目區 */
        .question-box {
            font-size: 1.3rem;
            font-weight: bold;
            color: #111;
            margin-bottom: 25px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 6px solid var(--primary-color);
        }

        /* 選項按鈕 */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px 20px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background-color: #f0f4f8;
        }

        .option-btn.correct {
            background-color: #d1e7dd !important;
            border-color: #a3cfbb !important;
            color: #0f5132 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: #f5c2c7 !important;
            color: #842029 !important;
        }

        /* 解析提示 */
        .rational-box {
            display: none;
            margin-top: 20px;
            padding: 15px 20px;
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            border-radius: 6px;
            color: #664d03;
            font-size: 1rem;
        }

        /* 按鈕基本樣式 */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s ease;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #fff;
            margin-top: 15px;
        }

        .btn-start:hover {
            opacity: 0.9;
        }

        .btn-next {
            background-color: var(--primary-color);
            color: white;
            margin-top: 25px;
            display: none;
        }

        .btn-next:hover {
            background-color: #1f4056;
        }

        .btn-wrong-retry {
            background-color: #e67e22;
            color: white;
            margin-bottom: 12px;
        }

        .btn-wrong-retry:hover {
            background-color: #d35400;
        }

        .btn-home {
            background-color: #7f8c8d;
            color: white;
        }

        /* 結果畫面 */
        .score-num {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary-color);
            text-align: center;
            margin: 20px 0;
        }

        .result-text {
            text-align: center;
            font-size: 1.15rem;
            margin-bottom: 30px;
            color: #444;
        }

        /* 跨平台支援（RWD 響應式網頁設計） */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .question-box {
                font-size: 1.15rem;
                padding: 15px;
            }
            .option-btn {
                font-size: 1rem;
                padding: 12px 15px;
            }
            .btn {
                padding: 12px;
                font-size: 1.1rem;
            }
            .score-num {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-start" class="card active">
        <h1>汽車英文專業術語學科檢定</h1>
        <div class="subtitle">模擬真實考試：40題英翻中 + 10題中翻英 (每題2分，總分100分)</div>
        <div style="background: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 0.95rem; color: #555;">
            <p>💡 <b>測驗說明：</b></p>
            <p>1. 系統題庫已擴充至 200 題（160題英翻中 與 40題中翻英）。</p>
            <p>2. 每次測驗將隨機抽取 40 題英翻中 與 10 題中翻英，組合為 50 題卷。</p>
            <p>3. 每題答完後，系統會立刻顯示正誤與該單字的解析提示。</p>
            <p>4. 答錯的題目會被自動記錄，並在結束時提供「錯題再練」功能。</p>
        </div>
        <button class="btn btn-start" onclick="startQuiz(false)">開始測驗</button>
    </div>

    <div id="screen-quiz" class="card">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="info-meta">
            <span id="info-type">分類：英翻中</span>
            <span id="info-count">題次：1 / 50</span>
        </div>
        <div id="question-text" class="question-box"></div>
        <div id="options-container" class="options-list"></div>
        <div id="rational-box" class="rational-box"></div>
        <button id="btn-next" class="btn btn-next" onclick="nextQuestion()">下一題</button>
    </div>

    <div id="screen-result" class="card">
        <h1>測驗結束</h1>
        <div id="score-display" class="score-num">0分</div>
        <div id="result-summary" class="result-text"></div>
        <div id="result-actions">
            <button id="btn-retry-wrong" class="btn btn-wrong-retry" onclick="startQuiz(true)">錯題再練</button>
            <button class="btn btn-home" onclick="goHome()">返回首頁</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// 汽車英文專業術語完整題庫擴充 (160題英翻中 + 40題中翻英，共200題)
// ==========================================
const dbEngToChn = [
    { q: "Ammeter", a: "電流錶", r: "Ammeter 用於串聯在電路中，主要量測電流強度與充電狀態。", o: ["電壓錶", "電流錶", "比重計", "測微器"] },
    { q: "Cylinder", a: "汽缸", r: "Cylinder 是活塞運動的密閉空間，為汽車內燃機的核心構造。", o: ["汽缸", "行程", "缸徑", "燃燒室"] },
    { q: "Octane Number", a: "辛烷值", r: "Octane Number 是測定汽油抗爆震能力（Antiknock Quality）的指標值。", o: ["十六烷值", "辛烷值", "壓縮比", "揮發度"] },
    { q: "Intake Stroke", a: "進氣行程", r: "四行程引擎的第一個行程，活塞往下運行以吸入混合氣或新鮮空氣。", o: ["壓縮行程", "動力行程", "排氣行程", "進氣行程"] },
    { q: "Valve", a: "汽門", r: "Valve 負責控制進、排氣通道的開啟與關閉，確保引擎正常換氣。", o: ["正時皮帶", "活塞銷", "汽門", "汽缸體"] },
    { q: "Gasoline", a: "汽油", r: "Gasoline 為點火式引擎（汽油機）所使用的主要揮發性液體燃料。", o: ["感知器", "汽油", "節流閥", "燃油泵"] },
    { q: "Nozzle", a: "噴油嘴", r: "Nozzle 用於將燃油轉變為細小霧狀微粒並精準噴入汽缸或進氣道中。", o: ["調速器", "正時器", "噴油嘴", "預熱塞"] },
    { q: "Piston Ring", a: "活塞環", r: "Piston Ring 裝在活塞槽內，包含氣環（密封）與油環（刮油及導熱）。", o: ["連桿", "飛輪", "活塞環", "活塞銷"] },
    { q: "Timing Belt", a: "正時皮帶", r: "Timing Belt 用於連接曲軸與凸輪軸，使汽門開閉與活塞位置精準同步。", o: ["汽門", "正時皮帶", "汽缸套", "凸輪軸"] },
    { q: "Fuel Pump", a: "燃油泵浦", r: "Fuel Pump 負責將燃油從油箱中吸出，建立壓力並輸送至供油系統。", o: ["燃料噴油器", "節流閥", "燃油濾清器", "燃油泵浦"] },
    { q: "Thermostat", a: "節溫器", r: "Thermostat 俗稱水龜，用於根據冷卻水溫自動切換大、小循環以控制引擎工作溫度。", o: ["水泵浦", "冷卻液", "防凍劑", "節溫器"] },
    { q: "Turbocharger", a: "渦輪增壓器", r: "Turbocharger 利用排出的廢氣來驅動渦輪，藉此壓縮並增加引擎的進氣量。", o: ["空氣濾清器", "渦輪增壓器", "中間冷卻器", "化油器"] },
    { q: "Clutch", a: "離合器", r: "Clutch 位在引擎與變速箱之間，負責將動力進行切斷或傳遞傳輸。", o: ["變速箱", "離合器", "差速器", "傳動軸"] },

    { q: "Damper", a: "減震器", r: "Damper（Shock Absorber）用於迅速吸收懸吊彈簧因衝擊而產生的二次反彈震動。", o: ["平穩桿", "控制臂", "減震器", "三角架"] },

    { q: "Evaporator", a: "蒸發器", r: "Evaporator 負責讓低壓霧狀冷媒在內部沸騰膨脹吸熱，以冷卻吹過其表面的空氣。", o: ["電壓錶", "乾燥瓶", "油封", "蒸發器"] },
    { q: "Odometer", a: "里程計", r: "Odometer 用於累計與顯示車輛出廠以來所行駛的總行駛里程數。", o: ["天線", "差速器", "里程計", "行車紀錄器"] },
    { q: "Instrument Cluster", a: "儀表總成", r: "Instrument Cluster 整合了時速表、轉速表、水溫表與油量表等核心駕駛資訊。", o: ["室內後視鏡", "擋風玻璃", "儀表總成", "車門飾板"] },

    { q: "Daytime Running Lamp", a: "晝行燈", r: "Daytime Running Lamp (DRL) 在白天行車時自動開啟，提升車輛識別度與安全性。", o: ["霧燈", "煞車燈", "晝行燈", "頭燈"] },

    { q: "High Pressure Pipe", a: "高壓鋼管", r: "High Pressure Pipe 常見於柴油共軌或直噴系統，用於承載與輸送極高壓力的燃油。", o: ["高壓鋼管", "調速器", "預熱塞", "流量限流閥"] },
    { q: "Pressure Regulation Valve", a: "壓力調節閥", r: "Pressure Regulation Valve 根據回饋自動開啟或關閉以調控管路中的工作壓力。", o: ["壓力調節閥", "共軌管", "混合比感知器", "電子控制單元"] },

let currentQuestions = []; // 目前正在測驗的題目集
let currentIndex = 0;      // 目前進行到第幾題
let score = 0;              // 全新測驗累計分數
let wrongLog = [];         // 答錯題目的暫存資料庫
let isWrongRetryMode = false; // 是否正在進行錯題再練

// Fisher-Yates 陣列隨機洗牌演算法
function shuffle(array) {
    let m = array.length, t, i;
    while (m) {
        i = Math.floor(Math.random() * m--);
        t = array[m];
        array[m] = array[i];
        array[i] = t;
    }
    return array;
}

// 畫面切換控制
function switchScreen(screenId) {
    document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

// 初始化並啟動測驗
function startQuiz(retryMode) {
    isWrongRetryMode = retryMode;
    currentIndex = 0;

    if (!isWrongRetryMode) {
        // 【全新測驗】：英翻中(160題)打亂後隨機抽40題 + 中翻英(40題)打亂後隨機抽10題，最後彙整成50題卷
        score = 0;
        wrongLog = [];

        let shuffledPart1 = shuffle([...dbEngToChn]).slice(0, 40); // 隨機抽 40 題英翻中
        let shuffledPart2 = shuffle([...dbChnToEng]).slice(0, 10); // 隨機抽 10 題中翻英

        currentQuestions = [...shuffledPart1, ...shuffledPart2];
    } else {
        // 【錯題再練】：將剛才記錄下來的答錯題目重新洗牌
        currentQuestions = shuffle([...wrongLog]);
        wrongLog = []; // 清空以記錄新一輪的錯題
    }

    switchScreen('screen-quiz');
    loadQuestion();
}

// 載入當前題目
function loadQuestion() {
    // 隱藏解析與下一題按鈕
    document.getElementById('rational-box').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';

    if (currentQuestions.length === 0) {
        alert("目前沒有錯題紀錄，請先挑戰一般測驗！");
        goHome();
        return;
    }

    // 檢查是否已全部答完
    if (currentIndex >= currentQuestions.length) {
        showResult();
        return;
    }

    // 更新進度條
    const progressPercent = (currentIndex / currentQuestions.length) * 100;
    document.getElementById('progress-bar').style.width = progressPercent + '%';

    // 取得目前題目資料
    const qData = currentQuestions[currentIndex];

    // 更新題次與分類中繼資訊
    document.getElementById('info-count').innerText = `題次：${currentIndex + 1} / ${currentQuestions.length}`;
    if (currentIndex < 40 && !isWrongRetryMode) {
        document.getElementById('info-type').innerText = "分類：一、英翻中(每題2分)";
    } else if (!isWrongRetryMode) {
        document.getElementById('info-type').innerText = "分類：二、中翻英(每題2分)";
    } else {
        document.getElementById('info-type').innerText = "錯題精確強化練習中";
    }

    // 顯示題目內容
    document.getElementById('question-text').innerText = `題目： ${qData.q}`;

    // 打亂題目內的選項順序
    const shuffledOptions = shuffle([...qData.o]);

    // 渲染選項按鈕
    const container = document.getElementById('options-container');
    container.innerHTML = '';

    shuffledOptions.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = option;
        // 綁定點擊事件並傳入相關資料
        btn.onclick = () => selectAnswer(btn, option, qData.a, qData.r, qData);
        container.appendChild(btn);
    });
}

// 處理使用者點選答案
function selectAnswer(selectedBtn, chosenOpt, correctOpt, rationale, fullQuestionData) {
    // 立即鎖定本題所有選項，防止重複點擊
    const allButtons = document.querySelectorAll('.option-btn');
    allButtons.forEach(btn => btn.disabled = true);

    // 展開即時詳解說明
    const rationalBox = document.getElementById('rational-box');
    rationalBox.innerHTML = `<b>【解析提示 (Rationale)】</b><br>${rationale}`;
    rationalBox.style.display = 'block';

    if (chosenOpt === correctOpt) {
        // 答對變綠色
        selectedBtn.classList.add('correct');
        // 只有在全新測驗模式下才計算加分；錯題再練僅做導正複習
        if (!isWrongRetryMode) {
            score += 2;
        }
    } else {
        // 答錯變紅色
        selectedBtn.classList.add('wrong');
        // 並找出正確的那個選項強制標註為綠色，加深印象
        allButtons.forEach(btn => {
            if (btn.innerText === correctOpt) {
                btn.classList.add('correct');
            }
        });

        // 記錄該題到錯題本中 (避免重複加入)
        if (!wrongLog.some(item => item.q === fullQuestionData.q)) {
            wrongLog.push(fullQuestionData);
        }
    }

    // 顯示「下一題」按鈕
    document.getElementById('btn-next').style.display = 'block';
}

// 進入下一題
function nextQuestion() {
    currentIndex++;
    loadQuestion();
}

// 顯示最後測驗結果
function showResult() {
    document.getElementById('progress-bar').style.width = '100%';
    switchScreen('screen-result');

    const scoreDisplay = document.getElementById('score-display');
    const summary = document.getElementById('result-summary');
    const retryWrongBtn = document.getElementById('btn-retry-wrong');

    if (!isWrongRetryMode) {
        // 顯示正常挑戰總結
        scoreDisplay.innerText = `${score} 分`;
        if (wrongLog.length > 0) {
            summary.innerHTML = `本次全新測驗已結束。<br>您的得分為 <b>${score}分</b>，一共答錯了 <b>${wrongLog.length}</b> 題。<br>點擊下方「錯題再練」可針對錯誤題目個別特訓！`;
            retryWrongBtn.style.display = 'block';
        } else {
            summary.innerHTML = `🎉 太厲害了！您獲得了 <b>100分滿分</b>！<br>完美的汽車英文術語專家，已無任何錯題需要練習。`;
            retryWrongBtn.style.display = 'none';
        }
    } else {
        // 顯示再練模式總結
        scoreDisplay.innerText = "複習完成";
        if (wrongLog.length > 0) {
            summary.innerHTML = `這一輪的錯題強化中，您仍有 <b>${wrongLog.length}</b> 題不小心答錯。<br>別氣餒，再點擊一次按鈕繼續練習，直到全部答對為止！`;
            retryWrongBtn.style.display = 'block';
        } else {
            summary.innerHTML = `✨ 恭喜！本次遺留的錯題已<b>全數答對、複習完畢</b>！<br>您的不熟練盲點已成功清除，可以返回首頁重新挑戰完整測驗囉。`;
            retryWrongBtn.style.display = 'none';
        }
    }
}

// 返回主畫面
function goHome() {
    switchScreen('screen-start');
}
</script>
